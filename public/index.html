<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Delivery Manager</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
    select option { background: #1e293b; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Worker proxy removed - calling Google Apps Script directly for multi-device support

const C = {
  bg:"#0f172a", panel:"#0d1a2b", card:"#1e293b",
  border:"#1e3a5f", text:"#e2e8f0", muted:"#64748b",
  accent:"#3b82f6", green:"#22c55e", red:"#ef4444", yellow:"#f59e0b"
};

const todayStr = () => { const d=new Date(); return `${d.getDate()}/${d.getMonth()+1}/${String(d.getFullYear()).slice(2)}`; };
const COL_W = { Date:75, Device:180, Buyer:80, Seller:80, Tracking:130, Address:210, Price:68, "Price Total":90, Paid:95, Balance:95 };

const storage = {
  get: (k) => { try { const v=localStorage.getItem(k); return v ? { value: v } : null; } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k,v); } catch {} },
  del: (k)   => { try { localStorage.removeItem(k); } catch {} },
};

function App() {
  const [gasUrl, setGasUrl]         = useState("");
  const [token, setToken]           = useState("");
  const [urlDraft, setUrlDraft]     = useState("");
  const [tokenDraft, setTokenDraft] = useState("");
  const [ready, setReady]           = useState(false);
  const [connectErr, setConnectErr] = useState("");

  const [tab, setTab]     = useState("deliveries");
  const [panel, setPanel] = useState(null);

  const [rows, setRows]       = useState([]);
  const [headers, setHeaders] = useState([]);
  const [prices, setPrices]   = useState([]);
  const [sheets, setSheets]   = useState({ sellers:[], buyers:[] });

  const [search, setSearch]       = useState("");
  const [busy, setBusy]           = useState({});
  const [toast, setToast]         = useState(null);
  const [editCell, setEditCell]   = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);

  const [aiText, setAiText]       = useState("");
  const [aiResults, setAiResults] = useState(null);
  const [pay, setPay] = useState({ person:"", amount:"", currency:"EUR", note:"", dir:"to" });
  const [pf,  setPf]  = useState({ device:"", price:"", mode:"add" });

  // Individual sheet viewer state
  const [selectedSheet, setSelectedSheet] = useState(null);
  const [sheetData, setSheetData]         = useState([]);
  const [sheetHeaders, setSheetHeaders]   = useState([]);
  const [sheetSearch, setSheetSearch]     = useState("");
  const [editSheetCell, setEditSheetCell] = useState(null);
  const [confirmSheetDel, setConfirmSheetDel] = useState(null);

  const toastRef = useRef();
  const urlRef   = useRef("");
  const tokRef   = useRef("");

  useEffect(() => {
    const cfg = storage.get("dm-config-v1");
    if (cfg?.value) {
      try {
        const { url, token } = JSON.parse(cfg.value);
        if (url && token) {
          setGasUrl(url); setUrlDraft(url); urlRef.current = url;
          setToken(token); setTokenDraft(token); tokRef.current = token;
          setReady(true);
        }
      } catch {}
    }
  }, []);

  useEffect(() => { if (ready) fetchAll(); }, [ready]);

  const notify = (msg, type="ok") => {
    clearTimeout(toastRef.current);
    setToast({ msg, type });
    toastRef.current = setTimeout(() => setToast(null), 3500);
  };
  const load = (k, v) => setBusy(b => ({...b,[k]:v}));

  const api = async (action, params={}) => {
    const url = urlRef.current;
    const tok = tokRef.current;
    if (!url || !tok) throw new Error("Not connected");
    const qs = new URLSearchParams({
      token: tok, action,
      body: JSON.stringify({ token: tok, action, ...params })
    }).toString();
    const target = `${url}?${qs}`;
    // Call Google Apps Script directly - supports multiple devices simultaneously
    const res = await fetch(target, { redirect: 'follow' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error("Response not JSON:\n" + text.slice(0,200)); }
    if (!data.ok) throw new Error(data.error || "API error");
    return data.data;
  };

  const fetchAll    = () => { fetchRows(); fetchPrices(); fetchSheets(); };
  const fetchRows   = async () => { load("rows",true); try { const d=await api("rows"); const arr=d||[]; if(arr.length>0) setHeaders(Object.keys(arr[0]).filter(k=>!k.startsWith("_"))); setRows(arr); } catch(e){notify("Load failed: "+e.message,"err");} load("rows",false); };
  const fetchPrices = async () => { load("prices",true); try { setPrices(await api("pricelist")||[]); } catch(e){notify("Price load: "+e.message,"err");} load("prices",false); };
  const fetchSheets = async () => { try { setSheets(await api("sheets")||{sellers:[],buyers:[]}); } catch {} };

  const saveConfig = async () => {
    if (!urlDraft.trim()||!tokenDraft.trim()) { setConnectErr("Both URL and token required."); return; }
    setConnectErr(""); load("connect",true);
    urlRef.current = urlDraft.trim(); tokRef.current = tokenDraft;
    try {
      await api("sheets");
      setGasUrl(urlDraft.trim()); setToken(tokenDraft);
      storage.set("dm-config-v1", JSON.stringify({ url:urlDraft.trim(), token:tokenDraft }));
      setReady(true); setPanel(null); notify("Connected ✓");
    } catch(e) {
      urlRef.current = gasUrl; tokRef.current = token;
      setConnectErr(e.message);
    }
    load("connect",false);
  };



  const extractAI = async () => {
    if (!aiText.trim()) return;
    load("ai", true);
    setAiResults(null);
    try {
      // Build device list with exact names for matching
      const deviceList = prices.map(p => p.device).join(", ");
      
      // Build seller names list (just the names, no extra text)
      const sellerNames = sheets.sellers.map(s => s.name).join(", ");
      
      // Build buyer names list
      const buyerNames = sheets.buyers.map(b => b.name).join(", ");
      
      // Create detailed device reference
      const deviceReference = prices.map((p, i) => `${i + 1}. "${p.device}"`).join("\n");
      
      // Create detailed seller reference
      const sellerReference = sheets.sellers.map((s, i) => `${i + 1}. "${s.name}"`).join("\n");
      
      const sys = `You are a parcel data extractor from WhatsApp messages.

  AVAILABLE DEVICES (use EXACT names):
  ${deviceReference}

  AVAILABLE SELLERS (use EXACT names only):
  ${sellerReference}

  KNOWN BUYERS: ${buyerNames}

  EXTRACTION INSTRUCTIONS:
  1. Each message starting with [TIME] is ONE parcel
  2. Parse EVERY timestamp message as a separate parcel
  3. Extract fields exactly:

    DATE: From [M/D, TIME] → convert to D/M/YY format (use 26 for year 2026)
    SELLER: Extract the person's name AFTER timestamp, BEFORE colon. Then MATCH to available sellers list.
            Example: "[4/29, 1:03 PM] Talha Seller:" → extract "Talha Seller" → find best match in sellers list
            Return the EXACT seller name from the list, not the raw text
    TRACKING: Find codes like LK817841390IE (letters + numbers) or nine digit number 238599053
    DEVICE: Find device name in the parcel text and MATCH to device list EXACTLY
            If no exact match, search for partial matches (e.g., "S26" matches both "Samsung S26 256gb" and "Samsung S26 512gb", only get the one with the lowest memory in the list, here it is "Samsung S26 256gb")
            Return ONLY the exact device name from the list or empty string
    BUYER: If address contains "APARTMENT 157" or "D07KN36", buyer is "Shoaib". Otherwise guess from context.
    ADDRESS: Extract full address, convert to single line, uppercase

  EXAMPLE:
  Input: [4/29, 1:03 PM] Talha Seller: LK817841390IE
        Apartment 157 The Old Distillery Anne street north Dublin 7 D07 KN36
        S25FE
        Delivered

  Output: {"Date":"29/4/26","Device":"S25 FE 128gb","Buyer":"Shoaib","Seller":"Talha","Tracking":"LK817841390IE","Address":"APARTMENT 157 THE OLD DISTILLERY ANNE STREET NORTH DUBLIN 7 D07 KN36"}

  SELLER MATCHING LOGIC:
  - Raw text says "Talha Seller" or "jaquline  Healy"
  - Look in AVAILABLE SELLERS list
  - Find the closest match (e.g., "Talha Seller" → match "Talha")
  - Return EXACT name from sellers list

  DEVICE MATCHING LOGIC:
  - Text says "Apple 17 pro max-256" or "17 pro max 256" 
  - Search device list for entries containing "17" AND ("pro" OR "max" OR "256")
  - IPhone 17 != IPhone 17 Pro != IPhone 17 Pro Max != IPhone 17 AIR != IPhone 17E
  - If found "IPhone 17 Pro Max 256gb" in list → return EXACTLY "IPhone 17 Pro Max 256gb"
  - Text says "S25Fe-128" 
  - Search device list for "S25 FE" not "S25Fe" or "S25"
  - Return exact match from list

  CRITICAL RULES:
  - Return ONLY valid JSON array
  - Each parcel = one object with fields: Date, Seller, Tracking, Device, Buyer, Address
  - Seller and Device MUST match available lists or be empty string
  - No markdown, no backticks, no explanations
  - Start with [ and end with ]`;

      const res = await fetch("/api/extract", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "gemini-2.0-flash",
          max_tokens: 4000,
          system: sys,
          messages: [{ role: "user", content: aiText }]
        })
      });

      const d = await res.json();
      let raw = d.content?.find(b => b.type === "text")?.text || "[]";
      
      console.log("Gemini raw response:", raw.slice(0, 500));
      
      // Clean markdown fences
      raw = raw.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
      
      let parsed = [];
      try {
        parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          parsed = [parsed];
        }
      } catch (e) {
        console.error("JSON parse error:", e);
        console.error("Failed to parse:", raw.slice(0, 300));
        notify("Gemini returned invalid JSON. Check console.", "err");
        load("ai", false);
        return;
      }

      // Validate and normalize seller/device names
      const validSellers = sheets.sellers.map(s => s.name);
      const validDevices = prices.map(p => p.device);
      
      parsed = parsed.map(parcel => {
        // Try to match seller to available sellers (case-insensitive)
        let seller = parcel.Seller || "";
        if (seller && !validSellers.includes(seller)) {
          const lowerSeller = seller.toLowerCase();
          const match = validSellers.find(s => s.toLowerCase().includes(lowerSeller) || lowerSeller.includes(s.toLowerCase()));
          seller = match || "";
        }
        
        // Ensure device is valid
        let device = parcel.Device || "";
        if (device && !validDevices.includes(device)) {
          device = "";
        }
        
        return {
          Date: parcel.Date || "",
          Seller: seller,
          Tracking: parcel.Tracking || "",
          Device: device,
          Buyer: parcel.Buyer || "Shoaib",
          Address: parcel.Address || ""
        };
      });

      if (parsed.length === 0) {
        notify("No parcels extracted. Try a different format.", "err");
      } else {
        setAiResults(parsed);
        notify(`${parsed.length} parcel${parsed.length !== 1 ? "s" : ""} extracted ✓`);
      }
    } catch (e) {
      console.error("Extraction error:", e);
      notify("Extraction failed: " + e.message, "err");
    }
    load("ai", false);
  };

  const confirmEntries = async () => {
    load("confirm",true);
    try {
      await api("appendRows",{rows:aiResults});
      notify(`${aiResults.length} parcel${aiResults.length!==1?"s":""} saved ✓`);
      setAiText(""); setAiResults(null); setPanel(null); fetchRows();
    } catch(e){notify("Save failed: "+e.message,"err");}
    load("confirm",false);
  };

  const saveCell = async (row,col,val) => {
    setEditCell(null);
    if (val===String(row[col]||"")) return;
    try { await api("updateRow",{row:row._row,data:{[col]:val}}); setRows(rs=>rs.map(r=>r._row===row._row?{...r,[col]:val}:r)); }
    catch(e){notify("Update failed: "+e.message,"err");}
  };

  const doDelete = async (row) => {
    setConfirmDel(null);
    try { await api("deleteRow",{row:row._row}); setRows(rs=>rs.filter(r=>r._row!==row._row)); notify("Row deleted ✓"); }
    catch(e){notify("Delete failed: "+e.message,"err");}
  };

  const submitPayment = async () => {
    if (!pay.person||!pay.amount){notify("Person & amount required","err");return;}
    load("pay",true);
    try { await api("payment",{...pay}); notify(`Payment recorded in ${pay.person}'s sheet ✓`); setPay({person:"",amount:"",currency:"EUR",note:"",dir:"to"}); setPanel(null); }
    catch(e){notify("Failed: "+e.message,"err");}
    load("pay",false);
  };

  const submitPrice = async () => {
    if (!pf.device||!pf.price){notify("Device & price required","err");return;}
    load("price",true);
    try { await api(pf.mode==="add"?"addPrice":"updatePrice",{device:pf.device,price:parseFloat(pf.price)}); notify(`Price ${pf.mode==="add"?"added":"updated"} ✓`); setPf({device:"",price:"",mode:"add"}); fetchPrices(); }
    catch(e){notify(e.message,"err");}
    load("price",false);
  };

  const deletePrice = async (device) => {
    try { await api("deletePrice",{device}); notify(`${device} removed ✓`); fetchPrices(); }
    catch(e){notify(e.message,"err");}
  };

  const syncPrices = async () => {
    load("sync",true);
    try { const r=await api("syncPrices"); const ok=r.sync.filter(s=>s.status==="ok").length; notify(`Updated prices in ${ok}/${r.sync.length} sheets ✓`); }
    catch(e){notify("Sync failed: "+e.message,"err");}
    load("sync",false);
  };

  // Individual sheet functions
  const fetchSheetData = async (sheetName) => {
    if (!sheetName) return;
    load("sheetData",true);
    try {
      const d = await api("sheetRows", { sheet: sheetName });
      const arr = d || [];
      if (arr.length > 0) setSheetHeaders(Object.keys(arr[0]).filter(k => !k.startsWith("_")));
      setSheetData(arr);
    } catch(e) { notify("Load sheet failed: " + e.message, "err"); }
    load("sheetData",false);
  };

  const saveSheetCell = async (row, col, val) => {
    setEditSheetCell(null);
    if (val === String(row[col] || "")) return;
    try {
      await api("updateSheetRow", { sheet: selectedSheet, row: row._row, data: { [col]: val } });
      setSheetData(rs => rs.map(r => r._row === row._row ? { ...r, [col]: val } : r));
    } catch(e) { notify("Update failed: " + e.message, "err"); }
  };

    load("report",true);

        <input style={{...inp,marginBottom:12,fontSize:12}} value={urlDraft} onChange={e=>setUrlDraft(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec"/>
        <label style={lbl}>AUTH TOKEN</label>
        <input style={{...inp,marginBottom:16}} type="password" value={tokenDraft} onChange={e=>setTokenDraft(e.target.value)} placeholder="Your secret token" onKeyDown={e=>e.key==="Enter"&&saveConfig()}/>
        <button style={{...btn(),width:"100%",padding:10,fontSize:13,opacity:busy.connect?0.6:1}} onClick={saveConfig} disabled={busy.connect}>
          {busy.connect?"Connecting…":"Connect"}
        </button>
        {connectErr&&<div style={{marginTop:12,background:"#7f1d1d",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#fca5a5",lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>⚠ {connectErr}</div>}
      </div>
    </div>
  );

        <button 
          style={{...btn(),padding:"14px 16px",fontSize:14,borderRadius:50,boxShadow:"0 4px 12px rgba(0,0,0,0.3)",opacity:panel==="add"?0.7:1}}

                            </td>

                        <td style={{padding:"5px 4px",borderBottom:`1px solid rgba(30,58,95,0.4)`,textAlign:"center"}}>

                            <button onClick={()=>setConfirmDel(row._row)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:"2px 4px"}}>X</button>

                  <div style={{flex:"1 1 150px",minWidth:120}}>
                    <label style={lbl}>SELECT SHEET</label>
                    <select style={{...inp,cursor:"pointer"}} value={selectedSheet||""} onChange={e=>handleSheetSelect(e.target.value)}>
                      <option value="">Choose a sheet...</option>
                      <optgroup label="Sellers">
                        {sheets.sellers.map(s=>(
                          <option key={s.name} value={s.name}>{s.name} (-{s.deduction})</option>

                      </optgroup>
                      <optgroup label="Buyers">
                        {sheets.buyers.map(b=>(
                          <option key={b.name} value={b.name}>{b.name}</option>

                      </optgroup>
                    </select>
                  </div>

                    <div style={{alignSelf:"flex-end",fontSize:12,color:C.muted}}>

                    <div style={{fontWeight:600}}>Select a Sheet</div>

                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:8,color:C.muted}}>
                    <div style={{fontSize:36}}>📋</div>
                    <div style={{fontWeight:600}}>No data in {selectedSheet}</div>
                    <div style={{fontSize:12}}>This sheet is empty</div>
                  </div>

                  (() => {
                    const filteredSheetRows = sheetData.filter(r => !sheetSearch || Object.values(r).some(v => String(v || "").toLowerCase().includes(sheetSearch.toLowerCase())));
                    return filteredSheetRows.length === 0 ? (
                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:8,color:C.muted}}>
                        <div style={{fontSize:36}}>🔍</div>
                        <div style={{fontWeight:600}}>No results</div>
                        <div style={{fontSize:12}}>Try a different search term</div>
                      </div>
                    ) : (
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:600}}>
                        <thead>
                          <tr>
                            <th style={{background:C.card,color:C.muted,padding:"8px 8px",position:"sticky",top:0,zIndex:2,borderBottom:`1px solid ${C.border}`,width:30,textAlign:"center"}}>#</th>
                            {sheetHeaders.map(h=>(
                              <th key={h} style={{background:C.card,color:C.muted,padding:"8px 10px",position:"sticky",top:0,zIndex:2,textAlign:"left",fontWeight:700,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap",minWidth:80}}>{h}</th>
                            ))}
                            <th style={{background:C.card,position:"sticky",top:0,zIndex:2,borderBottom:`1px solid ${C.border}`,width:32}}/>
                          </tr>
                        </thead>
                        <tbody>
                          {filteredSheetRows.map((row,ri)=>{
                            const isPay = String(row.Device||row.Type||"").toLowerCase().includes("payment");
                            return (
                              <tr key={row._row} style={{background:isPay?"rgba(34,197,94,0.05)":ri%2===0?"transparent":"rgba(255,255,255,0.015)"}}>

                                {sheetHeaders.map(col=>{
                                  const isEd = editSheetCell?.row===row._row && editSheetCell?.col===col;
                                  return (
                                    <td key={col} onClick={()=>setEditSheetCell({row:row._row,col})}
                                      style={{padding:isEd?"2px 4px":"5px 10px",borderBottom:`1px solid rgba(30,58,95,0.4)`,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:isPay?C.green:C.text,cursor:"pointer",verticalAlign:"middle"}}

                                          onBlur={e=>saveSheetCell(row,col,e.target.value)}
                                          onKeyDown={e=>{if(e.key==="Enter")saveSheetCell(row,col,e.target.value);if(e.key==="Escape")setEditSheetCell(null);}}/>
                                      ):String(row[col]||"")}
                                    </td>
                                  );
                                })}
                                <td style={{padding:"5px 4px",borderBottom:`1px solid rgba(30,58,95,0.4)`,textAlign:"center"}}>
                                  {confirmSheetDel===row._row?(
                                    <div style={{display:"flex",gap:3}}>
                                      <button onClick={()=>doSheetDelete(row)} style={{background:C.red,border:"none",color:"#fff",borderRadius:4,padding:"2px 6px",fontSize:10,cursor:"pointer",fontWeight:700}}>Yes</button>
                                      <button onClick={()=>setConfirmSheetDel(null)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:4,padding:"2px 5px",fontSize:10,cursor:"pointer"}}>No</button>
                                    </div>
                                  ):(
                                    <button onClick={()=>setConfirmSheetDel(row._row)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:"2px 4px"}}>X</button>
                                  )}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    );
                  })()
                )}
              </div>
            </div>
          )}

              </div>
              <div style={{background:C.card,borderRadius:8,padding:14,border:`1px solid ${C.border}`,marginBottom:14}}>

                            <label style={{...lbl,fontSize:9}}>{k}</label>
                            <input style={{...inp,padding:"4px 8px",fontSize:12}} value={e[k]||""}
                              onChange={ev=>setAiResults(p=>p.map((x,idx)=>idx===i?{...x,[k]:ev.target.value}:x))}/>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button style={{...btn(C.green),flex:1,opacity:busy.confirm?0.6:1}} onClick={confirmEntries} disabled={busy.confirm}>
                      {busy.confirm?"Saving…":"✓ Save All to Google Sheet"}
                    </button>
                    <button style={ghost} onClick={()=>setAiResults(null)}>Re-extract</button>
                  </div>
                </>)}
              </>)}

              {panel==="payment"&&(<>
                <div>
                  <label style={lbl}>DIRECTION</label>
                  <div style={{display:"flex",gap:6}}>
                    {["to","from"].map(d=>(
                      <button key={d} onClick={()=>setPay(p=>({...p,dir:d,person:""}))} style={{flex:1,padding:8,border:`1px solid ${pay.dir===d?C.accent:C.border}`,borderRadius:6,background:pay.dir===d?"rgba(59,130,246,0.15)":C.bg,color:pay.dir===d?C.accent:C.muted,cursor:"pointer",fontSize:12,fontWeight:700}}>
                        {d==="to"?"⬆ To Seller":"⬇ From Buyer"}
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <label style={lbl}>{pay.dir==="to"?"SELLER":"BUYER"}</label>
                  <select style={{...inp,cursor:"pointer"}} value={pay.person} onChange={e=>setPay(p=>({...p,person:e.target.value}))}>
                    <option value="">Select…</option>
                    {(pay.dir==="to"?sheets.sellers:sheets.buyers).map(s=>(
                      <option key={s.name} value={s.name}>{s.name}</option>
                    ))}
                  </select>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <div style={{flex:1}}>
                    <label style={lbl}>AMOUNT</label>
                    <input style={inp} type="number" value={pay.amount} onChange={e=>setPay(p=>({...p,amount:e.target.value}))} placeholder="0"/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={lbl}>CURRENCY</label>
                    <div style={{display:"flex",gap:4,height:36}}>
                      {["EUR","PKR"].map(c=>(
                        <button key={c} onClick={()=>setPay(p=>({...p,currency:c}))} style={{flex:1,border:`1px solid ${pay.currency===c?C.accent:C.border}`,borderRadius:6,background:pay.currency===c?"rgba(59,130,246,0.15)":C.bg,color:pay.currency===c?C.accent:C.muted,cursor:"pointer",fontSize:12,fontWeight:700}}>
                          {c==="EUR"?"€ EUR":"₨ PKR"}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
                <div>
                  <label style={lbl}>NOTE (OPTIONAL)</label>
                  <input style={inp} value={pay.note} onChange={e=>setPay(p=>({...p,note:e.target.value}))} placeholder="Reference or description…"/>
                </div>
                <button style={{...btn(C.green),padding:"10px",fontSize:13,opacity:busy.pay?0.6:1}} onClick={submitPayment} disabled={busy.pay}>
                  {busy.pay?"Recording…":"✓ Record Payment"}
                </button>
              </>)}

              {panel==="settings"&&(<>
                <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:0.5}}>CONNECTION</div>
                <div>
                  <label style={lbl}>WEB APP URL</label>
                  <input style={{...inp,fontSize:11}} value={urlDraft} onChange={e=>setUrlDraft(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec"/>
                </div>
                <div>
                  <label style={lbl}>AUTH TOKEN</label>
                  <input style={inp} type="password" value={tokenDraft} onChange={e=>setTokenDraft(e.target.value)} placeholder="Secret token"/>
                </div>
                <button style={{...btn(),opacity:busy.connect?0.6:1}} onClick={saveConfig} disabled={busy.connect}>
                  {busy.connect?"Reconnecting…":"Save & Reconnect"}
                </button>
                {connectErr&&<div style={{background:"#7f1d1d",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#fca5a5",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{connectErr}</div>}
                <div style={{background:C.bg,borderRadius:8,padding:12,border:`1px solid ${C.border}`,marginTop:4}}>
                  <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:8,letterSpacing:0.5}}>CONNECTED SHEETS</div>
                  <div style={{fontSize:12,marginBottom:4}}><span style={{color:C.muted}}>Sellers: </span>{sheets.sellers.map(s=>`${s.name}(-€${s.deduction})`).join(", ")||"—"}</div>
                  <div style={{fontSize:12}}><span style={{color:C.muted}}>Buyers: </span>{sheets.buyers.map(b=>b.name).join(", ")||"—"}</div>
                </div>
                <div style={{background:C.bg,borderRadius:8,padding:12,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:8,letterSpacing:0.5}}>STATS</div>
                  <div style={{fontSize:12,marginBottom:4}}><span style={{color:C.muted}}>Total rows: </span>{rows.length}</div>
                  <div style={{fontSize:12}}><span style={{color:C.muted}}>Price list devices: </span>{prices.length}</div>
                </div>
                <button style={{...ghost,color:C.red,borderColor:"#7f1d1d",fontSize:11,width:"100%",marginTop:4}}
                  onClick={()=>{storage.del("dm-config-v1");setReady(false);setToken("");setGasUrl("");setUrlDraft("");setTokenDraft("");}}>
                  Disconnect
                </button>
              </>)}
            </div>
          </div>
        )}
      </div>

      {toast&&(
        <div style={{position:"fixed",bottom:18,right:18,background:toast.type==="err"?"#7f1d1d":"#14532d",color:toast.type==="err"?"#fca5a5":"#86efac",padding:"10px 16px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>
          {toast.type==="err"?"⚠ ":"✓ "}{toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
